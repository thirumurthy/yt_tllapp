<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tamil Oli TVK</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: black;
        overflow: hidden;
      }

      .player-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      /* Optional: subtle overlay for style */
      .overlay {
        position: absolute;
        top: 10px;
        left: 15px;
        color: white;
        font-family: Arial, sans-serif;
        font-size: 14px;
        opacity: 0.7;
        z-index: 10;
      }
    </style>
  </head>

  <body>
    <div class="player-container">
      <div class="overlay">Live Player</div>

      <iframe
        src="https://www.youtube-nocookie.com/embed/HB5ChkRD8eU?autoplay=1&mute=1&controls=1&rel=0&modestbranding=1&playsinline=1"
        allow="autoplay; encrypted-media; fullscreen"
        allowfullscreen
      >
      </iframe>
    </div>
  </body>
</html>
