<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TLL TV · Admin Panel</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Space Mono", monospace;
        background: #0a0a0f;
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 0;
        border-bottom: 1px solid rgba(240, 176, 32, 0.3);
        margin-bottom: 30px;
      }
      .logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 32px;
        letter-spacing: 0.14em;
      }
      .logo span {
        color: #f0b020;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
      }
      .card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(240, 176, 32, 0.2);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 20px;
      }
      .card h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 24px;
        letter-spacing: 0.1em;
        color: #f0b020;
        margin-bottom: 20px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 15px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .form-group label {
        font-size: 10px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.6);
      }
      .form-group input {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        padding: 10px 12px;
        color: #fff;
        font-family: "Space Mono", monospace;
        font-size: 13px;
      }
      .form-group input:focus {
        outline: none;
        border-color: #f0b020;
      }
      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-family: "Space Mono", monospace;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-primary {
        background: #f0b020;
        color: #0a0a0f;
      }
      .btn-primary:hover {
        background: #ffc040;
      }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .btn-danger {
        background: rgba(224, 32, 32, 0.2);
        color: #e02020;
        border: 1px solid rgba(224, 32, 32, 0.3);
      }
      .btn-danger:hover {
        background: rgba(224, 32, 32, 0.4);
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
        flex-wrap: wrap;
      }
      .schedule-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 15px;
      }
      .schedule-item {
        display: flex;
        align-items: center;
        gap: 15px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 15px;
        transition: border-color 0.2s;
      }
      .schedule-item:hover {
        border-color: rgba(240, 176, 32, 0.3);
      }
      .schedule-item.inactive {
        opacity: 0.5;
      }
      .schedule-time {
        font-size: 14px;
        font-weight: 700;
        color: #f0b020;
        min-width: 70px;
      }
      .schedule-info {
        flex: 1;
      }
      .schedule-title {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .schedule-url {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.5);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 400px;
      }
      .schedule-duration {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.4);
        min-width: 80px;
        text-align: right;
      }
      .schedule-actions {
        display: flex;
        gap: 8px;
      }
      .btn-sm {
        padding: 6px 12px;
        font-size: 10px;
      }
      .message {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 12px;
      }
      .message.success {
        background: rgba(34, 197, 94, 0.2);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #22c55e;
      }
      .message.error {
        background: rgba(224, 32, 32, 0.2);
        border: 1px solid rgba(224, 32, 32, 0.3);
        color: #e02020;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: rgba(10, 10, 15, 0.95);
        border: 1px solid #f0b020;
        border-radius: 8px;
        padding: 12px 20px;
        font-size: 12px;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.3s;
        z-index: 100;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      .empty {
        text-align: center;
        padding: 40px;
        color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">TLL <span>TV</span> · Admin</div>
        <a href="index.html" class="btn btn-secondary btn-sm">View Player</a>
      </div>

      <div id="message" class="message" style="display: none"></div>

      <div class="card">
        <h2>Add / Edit Schedule</h2>
        <form id="schedule-form">
          <input type="hidden" id="edit-id" value="" />
          <div class="form-grid">
            <div class="form-group">
              <label>Start Time (HH:MM:SS)</label>
              <input
                type="text"
                id="streaming_time"
                placeholder="09:00:00"
                required
              />
            </div>
            <div class="form-group">
              <label>Title</label>
              <input
                type="text"
                id="title"
                placeholder="Program Title"
                required
              />
            </div>
            <div class="form-group">
              <label>YouTube URL</label>
              <input
                type="url"
                id="youtube_url"
                placeholder="https://youtube.com/watch?v=..."
                required
              />
            </div>
            <div class="form-group">
              <label>Start Offset (sec)</label>
              <input type="number" id="start_time" value="0" min="0" />
            </div>
            <div class="form-group">
              <label>Duration (sec)</label>
              <input
                type="number"
                id="end_time"
                value="3600"
                min="1"
                required
              />
            </div>
          </div>
          <div class="actions">
            <button type="submit" class="btn btn-primary">Save Schedule</button>
            <button
              type="button"
              class="btn btn-secondary"
              onclick="resetForm()"
            >
              Clear / Cancel
            </button>
          </div>
        </form>
      </div>

      <div class="card">
        <h2>Schedule List</h2>
        <div id="schedule-list" class="schedule-list"></div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
      const SUPABASE_URL = "https://wadxjpvokisrgyqkqnrc.supabase.co";
      const SUPABASE_KEY = "sb_publishable_e4SNfQTuep0XcqCfHqSyHg_jB1AZn72";
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
      }

      function showMessage(msg, type = "success") {
        const el = document.getElementById("message");
        el.textContent = msg;
        el.className = `message ${type}`;
        el.style.display = "block";
        setTimeout(() => (el.style.display = "none"), 4000);
      }

      async function fetchSchedules() {
        const { data, error } = await supabase
          .from("schedules")
          .select("*")
          .order("streaming_time");

        if (error) {
          showMessage("Error loading schedules: " + error.message, "error");
          return [];
        }
        return data || [];
      }

      async function saveSchedule(schedule) {
        if (schedule.id) {
          const { error } = await supabase
            .from("schedules")
            .update({ ...schedule, updated_at: new Date().toISOString() })
            .eq("id", schedule.id);
          if (error) throw error;
          showToast("Schedule updated");
        } else {
          const { error } = await supabase
            .from("schedules")
            .insert([{ ...schedule }]);
          if (error) throw error;
          showToast("Schedule added");
        }
      }

      async function deleteSchedule(id) {
        if (!confirm("Delete this schedule?")) return;
        const { error } = await supabase
          .from("schedules")
          .delete()
          .eq("id", id);
        if (error) {
          showMessage("Error deleting: " + error.message, "error");
        } else {
          showToast("Schedule deleted");
          renderSchedules();
        }
      }

      async function toggleActive(id, currentState) {
        const { error } = await supabase
          .from("schedules")
          .update({
            is_active: !currentState,
            updated_at: new Date().toISOString(),
          })
          .eq("id", id);
        if (!error) renderSchedules();
      }

      function editSchedule(item) {
        document.getElementById("edit-id").value = item.id;
        document.getElementById("streaming_time").value = item.streaming_time;
        document.getElementById("title").value = item.title;
        document.getElementById("youtube_url").value = item.youtube_url;
        document.getElementById("start_time").value = item.start_time;
        document.getElementById("end_time").value = item.end_time;
        document.getElementById("streaming_time").focus();
      }

      function resetForm() {
        document.getElementById("schedule-form").reset();
        document.getElementById("edit-id").value = "";
        document.getElementById("start_time").value = "0";
        document.getElementById("end_time").value = "3600";
      }

      function formatDuration(sec) {
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = sec % 60;
        return `${h}h ${m}m ${s}s`;
      }

      function renderSchedules(items) {
        const list = document.getElementById("schedule-list");
        if (!items || items.length === 0) {
          list.innerHTML =
            '<div class="empty">No schedules yet. Add one above.</div>';
          return;
        }
        list.innerHTML = items
          .map(
            (item) => `
        <div class="schedule-item ${item.is_active ? "" : "inactive"}">
          <div class="schedule-time">${item.streaming_time}</div>
          <div class="schedule-info">
            <div class="schedule-title">${item.title}</div>
            <div class="schedule-url">${item.youtube_url}</div>
          </div>
          <div class="schedule-duration">${formatDuration(item.end_time - item.start_time)}</div>
          <div class="schedule-actions">
            <button class="btn btn-secondary btn-sm" onclick='editSchedule(${JSON.stringify(item)})'>Edit</button>
            <button class="btn ${item.is_active ? "btn-danger" : "btn-primary"} btn-sm" onclick="toggleActive('${item.id}', ${item.is_active})">${item.is_active ? "Disable" : "Enable"}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteSchedule('${item.id}')">Delete</button>
          </div>
        </div>
      `,
          )
          .join("");
      }

      document
        .getElementById("schedule-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const id = document.getElementById("edit-id").value;
          const schedule = {
            streaming_time: document.getElementById("streaming_time").value,
            title: document.getElementById("title").value,
            youtube_url: document.getElementById("youtube_url").value,
            start_time:
              parseInt(document.getElementById("start_time").value) || 0,
            end_time: parseInt(document.getElementById("end_time").value),
            is_active: true,
          };
          if (id) schedule.id = id;
          try {
            await saveSchedule(schedule);
            resetForm();
            renderSchedules(await fetchSchedules());
          } catch (err) {
            showMessage("Error saving: " + err.message, "error");
          }
        });

      async function init() {
        const items = await fetchSchedules();
        renderSchedules(items);
      }
      init();
    </script>
  </body>
</html>
