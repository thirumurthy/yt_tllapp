<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <title>TLL TV · Live</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: "Space Mono", monospace;
      }

      /* ── Full-viewport YouTube player ── */
      #yt-wrap {
        position: fixed;
        inset: 0;
        z-index: 1;
      }
      /* Oversized iframe to fill screen in all aspect ratios */
      #yt-wrap iframe {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100vw;
        height: calc(100vw * 9 / 16);
        min-height: 100vh;
        min-width: calc(100vh * 16 / 9);
        transform: translate(-50%, -50%);
        border: none;
        pointer-events: none;
      }

      /* Tap shield — removed after unmute */
      #tap-shield {
        position: fixed;
        inset: 0;
        z-index: 2;
        cursor: default;
      }

      /* ══════════════════════════════════════
       CHANNEL BUG — top left
    ══════════════════════════════════════ */
      #channel-bug {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 10;
        pointer-events: none;
        user-select: none;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 5px;
      }

      /* Logo row */
      .bug-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* Pulsing live dot */
      .live-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #e02020;
        box-shadow: 0 0 0 0 rgba(224, 32, 32, 0.5);
        animation: pulse 2s ease-in-out infinite;
        flex-shrink: 0;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(224, 32, 32, 0.6);
        }
        60% {
          box-shadow: 0 0 0 9px rgba(224, 32, 32, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(224, 32, 32, 0);
        }
      }

      /* TLL TV logotype */
      .logo-text {
        font-family: "Bebas Neue", sans-serif;
        font-size: 32px;
        letter-spacing: 0.14em;
        line-height: 1;
        color: #ffffff;
        text-shadow:
          0 0 24px rgba(255, 255, 255, 0.3),
          0 2px 8px rgba(0, 0, 0, 1);
      }
      .logo-text .tv {
        color: #f0b020;
      }

      /* Hairline rule */
      .bug-rule {
        width: calc(100% + 4px);
        height: 1.5px;
        background: linear-gradient(
          90deg,
          rgba(240, 176, 32, 0.9) 0%,
          transparent 80%
        );
        margin-left: -2px;
      }

      /* Clock */
      #bug-clock {
        font-family: "Space Mono", monospace;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: rgba(255, 255, 255, 0.82);
        text-shadow:
          0 1px 3px rgba(0, 0, 0, 1),
          0 0 10px rgba(0, 0, 0, 0.9);
      }

      /* ══════════════════════════════════════
       LIVE BADGE — top right
    ══════════════════════════════════════ */
      #live-badge {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10;
        pointer-events: none;
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        padding: 4px 10px;
        backdrop-filter: blur(8px);
      }
      .live-blink {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #e02020;
        animation: blink 1.4s ease-in-out infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }
      .live-text {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        color: #fff;
        text-transform: uppercase;
      }

      /* ══════════════════════════════════════
       BOTTOM TITLE STRIP
    ══════════════════════════════════════ */
      #prog-strip {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 10;
        pointer-events: none;
        padding: 50px 24px 18px;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.72) 0%,
          transparent 100%
        );
        display: flex;
        align-items: flex-end;
        gap: 10px;
        opacity: 0;
        transition: opacity 0.7s;
      }
      #prog-strip.on {
        opacity: 1;
      }

      .now-pill {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #e02020;
        background: rgba(224, 32, 32, 0.14);
        border: 1px solid rgba(224, 32, 32, 0.35);
        border-radius: 3px;
        padding: 2px 7px;
        white-space: nowrap;
        align-self: center;
      }
      #prog-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 22px;
        letter-spacing: 0.07em;
        color: #fff;
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
      }

      /* ══════════════════════════════════════
       MUTE / CLICK-TO-WATCH OVERLAY
    ══════════════════════════════════════ */
      #mute-cover {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.52);
        cursor: pointer;
        transition: opacity 0.5s;
      }
      #mute-cover.out {
        opacity: 0;
        pointer-events: none;
      }

      .mute-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        background: rgba(10, 10, 14, 0.75);
        border: 1px solid rgba(240, 176, 32, 0.3);
        border-radius: 16px;
        padding: 30px 48px;
        backdrop-filter: blur(20px);
        transition:
          transform 0.2s,
          background 0.2s;
      }
      #mute-cover:hover .mute-card {
        transform: scale(1.04);
        background: rgba(10, 10, 14, 0.88);
      }
      .mute-icon {
        font-size: 50px;
        color: #f0b020;
      }
      .mute-hint {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.75);
      }

      /* ══════════════════════════════════════
       LOADING SCREEN
    ══════════════════════════════════════ */
      #loader {
        position: fixed;
        inset: 0;
        z-index: 30;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        transition: opacity 0.8s;
      }
      #loader.out {
        opacity: 0;
        pointer-events: none;
      }

      .load-logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 56px;
        letter-spacing: 0.16em;
        color: #fff;
      }
      .load-logo span {
        color: #f0b020;
      }

      .load-bar-bg {
        width: 160px;
        height: 2px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
      }
      .load-bar {
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #f0b020, #fff8e0);
        animation: lbar 2.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes lbar {
        0% {
          width: 0;
        }
        100% {
          width: 100%;
        }
      }

      .load-sub {
        font-size: 9px;
        letter-spacing: 0.25em;
        color: rgba(255, 255, 255, 0.25);
        text-transform: uppercase;
      }

      /* ══════════════════════════════════════
       CHANNEL TRANSITION FLASH
    ══════════════════════════════════════ */
      #flash {
        position: fixed;
        inset: 0;
        z-index: 25;
        background: #000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      #flash.show {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <!-- ── Video layer ── -->
    <div id="yt-wrap"><div id="yt-player"></div></div>

    <!-- ── Tap shield ── -->
    <div id="tap-shield"></div>

    <!-- ── Channel bug: TLL TV logo + clock ── -->
    <div id="channel-bug">
      <div class="bug-row">
        <div class="live-dot"></div>
        <span class="logo-text">TLL <span class="tv">TV</span></span>
      </div>
      <div class="bug-rule"></div>
      <span id="bug-clock">00:00:00</span>
    </div>

    <!-- ── LIVE badge ── -->
    <div id="live-badge">
      <div class="live-blink"></div>
      <span class="live-text">Live</span>
    </div>

    <!-- ── Bottom program strip ── -->
    <div id="prog-strip">
      <span class="now-pill">Now Playing</span>
      <span id="prog-title">—</span>
    </div>

    <!-- ── Click-to-watch overlay ── -->
    <div id="mute-cover">
      <div class="mute-card">
        <span class="material-symbols-outlined mute-icon">volume_up</span>
        <span class="mute-hint">Tap anywhere to watch</span>
      </div>
    </div>

    <!-- ── Loading screen ── -->
    <div id="loader">
      <div class="load-logo">TLL <span>TV</span></div>
      <div class="load-bar-bg"><div class="load-bar"></div></div>
      <div class="load-sub">Tuning in…</div>
    </div>

    <!-- ── Transition flash ── -->
    <div id="flash"></div>

    <script>
      // ╔══════════════════════════════════════════════════════════╗
      // ║  ★  PLAYLIST CONFIGURATION                             ║
      // ║                                                        ║
      // ║  streamingTime : "HH:MM:SS"  — broadcast time (IST)   ║
      // ║  startTime     : number      — YouTube seek start (s)  ║
      // ║  endTime       : number      — YouTube seek end (s)    ║
      // ║  title         : string      — shown at bottom         ║
      // ║  url           : YouTube URL                           ║
      // ╚══════════════════════════════════════════════════════════╝

        },
        {

        },
        {

          startTime: 0,
          endTime: 1560,
          title: "Eng 19",
          url: "https://www.youtube.com/watch?v=BzCzO3Hwa9M",
        },
        {
          streamingTime: "16:00:00",
          startTime: 0,
          endTime: 1020,
          title: "Eng 19",
          url: "https://www.youtube.com/watch?v=NL_dIADgDZY",
        },
        {
          streamingTime: "16:30:00",
          startTime: 0,
          endTime: 9000,
          title: "Movi - Vijay",
          url: "https://www.youtube.com/watch?v=_Or-2oummqI",
        },
        {
          streamingTime: "19:00:00",
          startTime: 0,
          endTime: 9000,
          title: "Eng 19",
          url: "https://www.youtube.com/watch?v=pMN7Q61kVG4",
        },
        {
          streamingTime: "21:30:00",
          startTime: 0,
          endTime: 9000,
          title: "Eng 19",
          url: "https://www.youtube.com/watch?v=kT6BJcF3ajM",
        },
      ];

      // ── ENGINE ──────────────────────────────────────────────────

      PLAYLIST.sort((a, b) => t2s(a.streamingTime) - t2s(b.streamingTime));

      let ytPlayer = null;
      let playerReady = false;
      let currentIdx = -1;
      let nextTimer = null;
      let isMuted = true;
      let pendingLoad = null;

      function t2s(str) {
        const p = String(str).split(":").map(Number);
        return p.length === 3 ? p[0] * 3600 + p[1] * 60 + p[2] : 0;
      }

      function nowSec() {
        const d = new Date(
          new Date().toLocaleString("en-US", { timeZone: TIMEZONE }),
        );
        return d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds();
      }

      function ytId(url) {
        try {
          const u = new URL(url);
          if (u.hostname.includes("youtube.com"))
            return u.searchParams.get("v");
          if (u.hostname === "youtu.be")
            return u.pathname.slice(1).split("?")[0];
        } catch {}
        return null;
      }

      // ── Clock ──
      function tickClock() {
        const d = new Date(
          new Date().toLocaleString("en-US", { timeZone: TIMEZONE }),
        );
        document.getElementById("bug-clock").textContent =
          String(d.getHours()).padStart(2, "0") +
          ":" +
          String(d.getMinutes()).padStart(2, "0") +
          ":" +
          String(d.getSeconds()).padStart(2, "0");
      }
      setInterval(tickClock, 1000);
      tickClock();

      // ── Loader dismiss after 3 s ──
      setTimeout(() => {
        const lo = document.getElementById("loader");
        lo.classList.add("out");
        setTimeout(() => (lo.style.display = "none"), 900);
      }, 3000);

      // ── Play logic ──
      function playProgram(idx, offset) {
        if (nextTimer) clearTimeout(nextTimer);
        currentIdx = idx;

        const prog = PLAYLIST[idx];
        const vid = ytId(prog.url);
        if (!vid) {
          scheduleNext(idx);
          return;
        }

        const seekTo = prog.startTime + Math.floor(offset);

        document.getElementById("prog-title").textContent = prog.title;
        document.getElementById("prog-strip").classList.add("on");

        // Transition flash (not on very first play)
        if (playerReady) {
          const fl = document.getElementById("flash");
          fl.classList.add("show");
          setTimeout(() => fl.classList.remove("show"), 380);
        }

        if (playerReady) {
          ytPlayer.loadVideoById({ videoId: vid, startSeconds: seekTo });
          if (isMuted) ytPlayer.mute();
          else ytPlayer.unMute();
        } else {
          pendingLoad = { videoId: vid, startSeconds: seekTo };
        }

        scheduleNext(idx);
      }

      function scheduleNext(idx) {
        const now = nowSec();
        const nextIdx = (idx + 1) % PLAYLIST.length;
        const nextAt = t2s(PLAYLIST[nextIdx].streamingTime);

        let ms;
        if (nextAt > now) {
          ms = (nextAt - now) * 1000;
        } else if (nextIdx === 0) {
          ms = (86400 - now + nextAt) * 1000;
        } else {
          const p = PLAYLIST[idx];
          ms =
            Math.max(t2s(p.streamingTime) + p.endTime - p.startTime - now, 5) *
            1000;
        }
        nextTimer = setTimeout(() => playProgram(nextIdx, 0), ms + 800);
      }

      function findAndPlay() {
        const now = nowSec();
        let idx = PLAYLIST.length - 1;
        for (let i = PLAYLIST.length - 1; i >= 0; i--) {
          if (t2s(PLAYLIST[i].streamingTime) <= now) {
            idx = i;
            break;
          }
        }
        const prog = PLAYLIST[idx];
        const starts = t2s(prog.streamingTime);
        const dur = prog.endTime - prog.startTime;
        const offset = now >= starts ? now - starts : now + 86400 - starts;

        if (offset >= dur) playProgram((idx + 1) % PLAYLIST.length, 0);
        else playProgram(idx, offset);
      }

      // ── YouTube IFrame API ──
      function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player("yt-player", {
          width: "100%",
          height: "100%",
          playerVars: {
            autoplay: 1,
            controls: 0,
            rel: 0,
            showinfo: 0,
            iv_load_policy: 3,
            modestbranding: 1,
            fs: 0,
            playsinline: 1,
            cc_load_policy: 0,
            disablekb: 1,
            origin: window.location.origin,
          },
          events: {
            onReady: onReady,
            onStateChange: onStateChange,
            onError: onError,
          },
        });
      }

      function onReady(e) {
        playerReady = true;
        e.target.mute();
        if (pendingLoad) {
          e.target.loadVideoById(pendingLoad);
          pendingLoad = null;
        } else {
          findAndPlay();
        }
        document.getElementById("mute-cover").style.display = "flex";
      }

      function onStateChange(e) {
        if (e.data === YT.PlayerState.ENDED)
          playProgram((currentIdx + 1) % PLAYLIST.length, 0);
      }

      function onError(e) {
        console.warn("YT error:", e.data);
        setTimeout(
          () => playProgram((currentIdx + 1) % PLAYLIST.length, 0),
          2000,
        );
      }

      // ── Unmute on tap ──
      function unmute() {
        isMuted = false;
        if (ytPlayer && playerReady) {
          ytPlayer.unMute();
          ytPlayer.setVolume(100);
        }
        const cover = document.getElementById("mute-cover");
        cover.classList.add("out");
        setTimeout(() => (cover.style.display = "none"), 600);
        // Allow iframe interaction (volume scrubber etc.)
        const iframe = document.querySelector("#yt-wrap iframe");
        if (iframe) iframe.style.pointerEvents = "auto";
        document.getElementById("tap-shield").style.display = "none";
      }

      document.getElementById("mute-cover").addEventListener("click", unmute);
      document.getElementById("tap-shield").addEventListener("click", unmute);

      // Pre-fill title before player loads
      const pre = (() => {
        const now = nowSec();
        let i = PLAYLIST.length - 1;
        for (; i >= 0; i--) if (t2s(PLAYLIST[i].streamingTime) <= now) break;
        return Math.max(i, 0);
      })();
      document.getElementById("prog-title").textContent = PLAYLIST[pre].title;
    </script>

    <!-- YouTube API loaded LAST so onYouTubeIframeAPIReady is already defined -->
    <script src="https://www.youtube.com/iframe_api"></script>
